{% extends "base.html" %}
{% block content %}
<form method="POST" action="." enctype='multipart/form-data'> {% csrf_token %}
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h2>Edit Location</h2>
      </div>
      {% if request.user.is_authenticated %}
      <button type="button" class="btn btn-sm btn-outline-warning pref-toggle {% if is_preferred %}active{% endif %}"
              data-url="{% url 'hmeteo_favorite' item.slug %}" title="Preferred">
        <i class="bi {% if is_preferred %}bi-star-fill{% else %}bi-star{% endif %}"></i>
      </button>
      {% endif %}
    </div>
    {{ form.as_p }}
    <button class="btn btn-primary" type="Submit">Change</button>
</form>
{% endblock %}
